name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Typecheck (mypy)
        # Whole-tree so it works across branches where eval/ may not exist yet.
        run: mypy .

      - name: Tests (pytest)
        # Exit code 5 = "no tests collected" — tolerated until suites land. Any real
        # failure still fails the job.
        run: |
          pytest -q; rc=$?; [ $rc -eq 0 ] || [ $rc -eq 5 ]
